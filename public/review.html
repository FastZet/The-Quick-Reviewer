<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Quick Reviewer</title>

  <!-- Icons & PWA -->
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
  <link rel="manifest" href="/assets/site.webmanifest">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">

  <!-- Base + Page Styles -->
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/review.css">
</head>
<body class="review-page" data-theme="auto" data-font="default">
  <div class="page-surface">
    <header class="title-bar">
      <div class="title-group">
        <h1 class="app-title">
          <span class="logo">⚡</span>
          <span class="gradient-text">Quick AI Review</span>
        </h1>
        <p id="meta" class="sub"></p>
      </div>

      <!-- Right-aligned compact controls (stay compact on mobile to reduce vertical space) -->
      <div class="controls-group">
        <div class="controls-row">
          <!-- Custom language picker with flags + short codes -->
          <div id="lang-picker" class="lang-picker" role="combobox" aria-haspopup="listbox" aria-expanded="false" aria-controls="lang-menu">
            <button id="lang-button" class="control-btn lang" type="button" aria-label="Language">
              <span id="lang-flag" class="flag">🇬🇧</span>
              <span id="lang-code" class="code">EN</span>
            </button>
            <div id="lang-menu" class="lang-menu" role="listbox" tabindex="-1" hidden></div>
          </div>

          <!-- Hidden native select for fallback and integration -->
          <select id="language-select" class="control-select native-select" aria-label="Target language" hidden>
            <option value="en" data-flag="🇬🇧" data-code="EN">English</option>
            <option value="zh-CN" data-flag="🇨🇳" data-code="ZH">Chinese (Simplified)</option>
            <option value="es" data-flag="🇪🇸" data-code="ES">Spanish</option>
            <option value="hi" data-flag="🇮🇳" data-code="HI">Hindi</option>
            <option value="ar" data-flag="🇸🇦" data-code="AR">Arabic</option>
            <option value="pt" data-flag="🇵🇹" data-code="PT">Portuguese</option>
            <option value="bn" data-flag="🇧🇩" data-code="BN">Bengali</option>
            <option value="ru" data-flag="🇷🇺" data-code="RU">Russian</option>
            <option value="ja" data-flag="🇯🇵" data-code="JA">Japanese</option>
            <option value="de" data-flag="🇩🇪" data-code="DE">German</option>
            <option value="fr" data-flag="🇫🇷" data-code="FR">French</option>
            <option value="ko" data-flag="🇰🇷" data-code="KO">Korean</option>
            <option value="tr" data-flag="🇹🇷" data-code="TR">Turkish</option>
            <option value="it" data-flag="🇮🇹" data-code="IT">Italian</option>
            <option value="nl" data-flag="🇳🇱" data-code="NL">Dutch</option>
            <option value="pl" data-flag="🇵🇱" data-code="PL">Polish</option>
            <option value="sv" data-flag="🇸🇪" data-code="SV">Swedish</option>
            <option value="fi" data-flag="🇫🇮" data-code="FI">Finnish</option>
            <option value="id" data-flag="🇮🇩" data-code="ID">Indonesian</option>
            <option value="vi" data-flag="🇻🇳" data-code="VI">Vietnamese</option>
          </select>

          <button id="translate-btn" class="control-btn" type="button" aria-label="Translate">Translate</button>
          <button id="theme-toggle" class="control-btn theme" type="button" aria-label="Toggle theme" title="Toggle Light/Dark">
            <svg class="icon sun" viewBox="0 0 24 24" aria-hidden="true"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.8 1.42-1.42zm10.48 0l1.8-1.79 1.41 1.41-1.79 1.8-1.42-1.42zM12 4V1h-0v3h0zm0 19v-3h0v3h0zM4 12H1v0h3v0zm19 0h-3v0h3v0zM6.76 19.16l-1.42 1.42-1.79-1.8 1.41-1.41 1.8 1.79zM19.16 17.24l1.42-1.42 1.79 1.8-1.41 1.41-1.8-1.79zM12 7a5 5 0 100 10 5 5 0 000-10z"/></svg>
            <svg class="icon moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/></svg>
          </button>
          <button id="font-toggle" class="control-btn font" type="button" aria-label="Cycle font size" title="Text size">Aa</button>
        </div>

        <!-- Keep Force New Review at top (right column on desktop, right under the row on mobile) -->
        <div class="controls-row secondary">
          <button id="refresh-btn" class="control-btn refresh" title="Generate new AI review" type="button">
            Force New Review
          </button>
        </div>
      </div>
    </header>

    <section class="status">
      <p id="loading" class="loading" {{LOADING_STATE}}>
        <span class="skeleton-dot"></span>
        Loading review...
      </p>
    </section>

    <main id="review" class="review-box">
      {{REVIEW_CONTENT}}
    </main>
  </div>

  <script>
    (function () {
      const isTranslated = window.location.hostname.endsWith('.translate.goog');

      // Elements
      const metaEl = document.getElementById('meta');
      const translateBtn = document.getElementById('translate-btn');
      const refreshBtn = document.getElementById('refresh-btn');
      const themeToggleBtn = document.getElementById('theme-toggle');
      const fontToggleBtn = document.getElementById('font-toggle');
      const nativeSelect = document.getElementById('language-select');
      const picker = document.getElementById('lang-picker');
      const pickerBtn = document.getElementById('lang-button');
      const pickerMenu = document.getElementById('lang-menu');
      const flagSpan = document.getElementById('lang-flag');
      const codeSpan = document.getElementById('lang-code');

      // URL params to show meta
      const params = new URLSearchParams(window.location.search);
      const type = (params.get('type') || '').trim();
      const id = (params.get('id') || '').trim();
      metaEl.textContent = `Type: ${type} • ID: ${id}`;

      // Theme management
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const storedTheme = localStorage.getItem('tqr_theme');
      function applyTheme(mode) {
        document.body.setAttribute('data-theme', mode);
        localStorage.setItem('tqr_theme', mode);
        themeToggleBtn.classList.toggle('is-dark', (mode === 'dark') || (mode === 'auto' && prefersDark));
      }
      applyTheme(storedTheme || 'auto');
      themeToggleBtn.addEventListener('click', () => {
        const current = document.body.getAttribute('data-theme') || 'auto';
        const next = current === 'auto'
          ? (prefersDark ? 'light' : 'dark')
          : (current === 'dark' ? 'light' : 'dark');
        applyTheme(next);
      });

      // Font size toggle (xsmall → small → default → large)
      const storedFont = localStorage.getItem('tqr_font') || 'default';
      applyFont(storedFont);
      fontToggleBtn.addEventListener('click', () => {
        const current = document.body.getAttribute('data-font') || 'default';
        const next = current === 'xsmall' ? 'small' : (current === 'small' ? 'default' : (current === 'default' ? 'large' : 'xsmall'));
        applyFont(next);
      });
      function applyFont(size) {
        document.body.setAttribute('data-font', size);
        localStorage.setItem('tqr_font', size);
      }

      // Build custom language menu from the hidden select
      const options = Array.from(nativeSelect.options).map(o => ({
        value: o.value,
        label: o.textContent,
        flag: o.getAttribute('data-flag') || '🏳️',
        code: o.getAttribute('data-code') || (o.value.split('-') || '').toUpperCase()
      }));
      function renderMenu() {
        pickerMenu.innerHTML = '';
        options.forEach((opt, i) => {
          const item = document.createElement('button');
          item.type = 'button';
          item.role = 'option';
          item.className = 'lang-item';
          item.dataset.value = opt.value;
          item.innerHTML = `<span class="flag">${opt.flag}</span><span class="code">${opt.code}</span><span class="label">${opt.label}</span>`;
          item.addEventListener('click', () => {
            setLang(opt.value);
            closeMenu();
          }, { passive: true });
          pickerMenu.appendChild(item);
        });
      }
      function setLang(value) {
        const found = options.find(o => o.value === value) || options;
        nativeSelect.value = found.value;
        flagSpan.textContent = found.flag;
        codeSpan.textContent = found.code;
        localStorage.setItem('tqr_lang', found.value);
      }
      function openMenu() {
        picker.setAttribute('aria-expanded', 'true');
        pickerMenu.hidden = false;
        pickerMenu.focus();
      }
      function closeMenu() {
        picker.setAttribute('aria-expanded', 'false');
        pickerMenu.hidden = true;
        pickerBtn.focus();
      }
      pickerBtn.addEventListener('click', (e) => {
        const expanded = picker.getAttribute('aria-expanded') === 'true';
        expanded ? closeMenu() : openMenu();
      });
      document.addEventListener('click', (e) => {
        if (!picker.contains(e.target)) closeMenu();
      }, { passive: true });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeMenu();
      });

      renderMenu();
      setLang(localStorage.getItem('tqr_lang') || nativeSelect.value || 'en');

      // Translate action uses the hidden native select value
      translateBtn.addEventListener('click', () => {
        const targetLanguage = nativeSelect.value;
        const cleanUrl = new URL(window.location.href);
        cleanUrl.searchParams.delete('force');
        const translateUrl = new URL('https://translate.google.com/translate');
        translateUrl.searchParams.set('sl', 'auto');
        translateUrl.searchParams.set('tl', targetLanguage);
        translateUrl.searchParams.set('u', cleanUrl.href);
        window.open(translateUrl.href, '_blank');
      });

      // Refresh review
      refreshBtn.addEventListener('click', () => {
        refreshBtn.disabled = true;
        refreshBtn.textContent = 'Refreshing...';
        const newUrl = new URL(window.location.href);
        newUrl.searchParams.set('force', 'true');
        window.location.href = newUrl.href;
      });

      // Disable interactivity on translated mirror
      if (isTranslated) {
        document.body.classList.add('translated-view');
        const banner = document.createElement('div');
        banner.className = 'translated-banner';
        let originalUrl = '#';
        try {
          const translatedUrlParams = new URLSearchParams(window.location.search);
          const originalUrlParam = translatedUrlParams.get('u');
          if (originalUrlParam) originalUrl = originalUrlParam;
        } catch (e) { console.error('Could not parse original URL'); }
        banner.innerHTML = 'You are viewing a translated version. Interactive features are disabled. <a href="' + originalUrl + '">View Original</a>';
        document.querySelector('.page-surface').prepend(banner);
        document.querySelector('.controls-group').style.display = 'none';
      }

      // Accordion: ensure Plot Summary opens by default and never needs double-click
      if (!isTranslated) setupAccordion();
      function setupAccordion() {
        const accordion = document.querySelector('#review .accordion');
        if (!accordion) return;

        const items = Array.from(accordion.querySelectorAll('.accordion-item'));
        const contents = items.map(it => it.querySelector('.accordion-content'));

        // Helper to open/close with consistent state + ARIA
        function openItem(item) {
          const content = item.querySelector('.accordion-content');
          item.classList.add('active');
          item.querySelector('.accordion-header')?.setAttribute('aria-expanded', 'true');
          // Measure after layout stabilizes
          requestAnimationFrame(() => {
            content.style.maxHeight = content.scrollHeight + 'px';
          });
        }
        function closeItem(item) {
          const content = item.querySelector('.accordion-content');
          item.classList.remove('active');
          item.querySelector('.accordion-header')?.setAttribute('aria-expanded', 'false');
          content.style.maxHeight = null;
        }

        // Ensure default open: prefer the server-marked active; else open first or “Plot Summary”
        const serverActive = accordion.querySelector('.accordion-item.active');
        const plotItem = Array.from(items).find(it => it.querySelector('.accordion-header')?.textContent.trim().toLowerCase().startsWith('plot summary'));
        const toOpen = serverActive || plotItem || items;
        if (toOpen) openItem(toOpen);

        // Keep height correct if fonts/contents change after load
        const ro = new ResizeObserver(() => {
          const active = accordion.querySelector('.accordion-item.active .accordion-content');
          if (active) active.style.maxHeight = active.scrollHeight + 'px';
        });
        contents.forEach(c => ro.observe(c));

        // Click handling (no double-toggle)
        accordion.addEventListener('click', (e) => {
          const header = e.target.closest('.accordion-header');
          if (!header) return;
          const currentItem = header.parentElement;
          const openNow = currentItem.classList.contains('active');

          // Close others
          items.forEach(it => { if (it !== currentItem) closeItem(it); });

          // Toggle current
          openNow ? closeItem(currentItem) : openItem(currentItem);
        }, { passive: true });
      }
    })();
  </script>
</body>
</html>
