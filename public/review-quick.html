<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Quick Reviewer - Quick View</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/review-v2.css">
    {{FAVICON_LINKS}}
</head>
<body>
    <header class="hero compact">
        <div class="container">
            <div class="hero-content">
                <div class="movie-poster compact">{{POSTER_CONTENT}}</div>
                <div class="movie-info">
                    {{HERO_CONTENT}}
                </div>
            </div>
        </div>
    </header>
    <section class="review-section">
        <div class="container">
            <div class="review-grid">
                <main class="review-main-content">
                    <div class="review-card">
                        <h3>📖 Plot Summary</h3>
                        <p class="review-text">{{PLOT_SUMMARY}}</p>
                    </div>
                    <div class="review-card">
                        <h3>🏆 Overall Verdict</h3>
                        <p class="review-text">{{OVERALL_VERDICT}}</p>
                    </div>
                </main>
                <aside class="sidebar">
                    {{SIDEBAR_CONTENT}}
                </aside>
            </div>
            <p class="timestamp">Review generated on: <span id="utc-timestamp" data-ts="{{TIMESTAMP}}">...</span></p>
        </div>
    </section>
    
    <!-- Language Selection Controls -->
    <div class="translation-controls">
        <select id="language-select" class="control-select">
            <option value="en">English</option>
            <option value="zh-CN">Chinese (Simplified)</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="pt">Portuguese</option>
            <option value="ru">Russian</option>
            <option value="ar">Arabic</option>
            <option value="hi">Hindi</option>
            <option value="it">Italian</option>
            <option value="nl">Dutch</option>
            <option value="pl">Polish</option>
            <option value="tr">Turkish</option>
            <option value="sv">Swedish</option>
            <option value="da">Danish</option>
            <option value="no">Norwegian</option>
            <option value="fi">Finnish</option>
            <option value="th">Thai</option>
        </select>
        <button id="translate-btn" class="control-btn translate">🌐 Translate</button>
    </div>

    <script>
        (function() {
            // Clean UTC timestamp formatting
            const tsEl = document.getElementById('utc-timestamp');
            if (tsEl && tsEl.dataset.ts) {
                const timestamp = parseInt(tsEl.dataset.ts, 10);
                const date = new Date(timestamp);
                
                // Format as YYYY-MM-DD HH:mm:ss UTC (no milliseconds)
                const year = date.getUTCFullYear();
                const month = String(date.getUTCMonth() + 1).padStart(2, '0');
                const day = String(date.getUTCDate()).padStart(2, '0');
                const hours = String(date.getUTCHours()).padStart(2, '0');
                const minutes = String(date.getUTCMinutes()).padStart(2, '0');
                const seconds = String(date.getUTCSeconds()).padStart(2, '0');
                
                tsEl.textContent = `${year}-${month}-${day} ${hours}:${minutes}:${seconds} UTC`;
            }

            // Google Translate Integration
            const translateBtn = document.getElementById('translate-btn');
            const languageSelect = document.getElementById('language-select');
            
            translateBtn.addEventListener('click', () => {
                const targetLanguage = languageSelect.value;
                const cleanUrl = new URL(window.location.href);
                cleanUrl.searchParams.delete('force'); // Remove force refresh parameter
                
                const translateUrl = new URL('https://translate.google.com/translate');
                translateUrl.searchParams.set('sl', 'auto'); // Source language: auto-detect
                translateUrl.searchParams.set('tl', targetLanguage); // Target language
                translateUrl.searchParams.set('u', cleanUrl.href); // URL to translate
                
                window.open(translateUrl.href, '_blank');
            });

            // Translation Detection and UI Adjustments
            const isTranslated = window.location.hostname.endsWith('.translate.goog');
            
            if (isTranslated) {
                document.body.classList.add('translated-view');
                
                // Hide interactive controls in translated mode
                const translationControls = document.querySelector('.translation-controls');
                const forceBtn = document.getElementById('force-refresh');
                
                if (translationControls) translationControls.style.display = 'none';
                if (forceBtn) forceBtn.style.display = 'none';
                
                // Add translation banner
                let originalUrl = '#';
                try {
                    const translatedUrlParams = new URLSearchParams(window.location.search);
                    const originalUrlParam = translatedUrlParams.get('u');
                    if (originalUrlParam) originalUrl = originalUrlParam;
                } catch (e) { 
                    console.error('Could not parse original URL'); 
                }
                
                const banner = document.createElement('div');
                banner.className = 'translated-banner';
                banner.innerHTML = 'You are viewing a translated version. Interactive features are disabled. <a href="' + originalUrl + '">View Original</a>';
                document.querySelector('.container').prepend(banner);
            }

            // Force Refresh Button Functionality
            const forceBtn = document.getElementById('force-refresh');
            if (forceBtn && !isTranslated) {
                forceBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    forceBtn.disabled = true;
                    forceBtn.innerHTML = '⏳ Generating...';
                    
                    const currentUrl = new URL(window.location.href);
                    currentUrl.searchParams.set('force', 'true');
                    window.location.href = currentUrl.href;
                });
            }
        })();
    </script>

    <style>
        /* Compact Hero Styles */
        .hero.compact {
            padding: 1.5rem 0; /* Reduced from 3rem */
            min-height: auto; /* Remove fixed height */
        }
        
        .hero.compact .hero-content {
            gap: 1.5rem; /* Reduced gap */
        }
        
        .movie-poster.compact {
            width: 150px; /* Reduced from 250px */
            height: 225px; /* Reduced from 375px */
            font-size: 2rem; /* Reduced font size */
        }
        
        .movie-info h1 {
            font-size: 1.75rem; /* Reduced from 2.5rem */
            margin-bottom: 0.75rem; /* Reduced margin */
        }
        
        .movie-meta {
            margin-bottom: 1rem; /* Reduced margin */
        }
        
        .rating-badge {
            padding: 0.4rem 0.8rem; /* Reduced padding */
        }
        
        .rating-score {
            font-size: 1.5rem; /* Reduced from 1.75rem */
        }
        
        .hero-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        
        .control-btn {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }
        
        .control-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }
        
        .control-btn.secondary {
            background: rgba(var(--accent-color), 0.2);
            border: 1px solid var(--accent-color);
        }
        
        .control-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Translation Controls */
        .translation-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 0.5rem;
            z-index: 1000;
        }
        
        .control-select {
            background: var(--content-background);
            border: 1px solid var(--border-color);
            color: var(--primary-text);
            padding: 0.5rem;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        
        .control-btn.translate {
            font-size: 0.85rem;
            padding: 0.5rem 0.75rem;
        }
        
        /* Translation Banner */
        .translated-banner {
            background: var(--accent-color);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.9rem;
        }
        
        .translated-banner a {
            color: white;
            text-decoration: underline;
            font-weight: 600;
        }
        
        /* Translated View Adjustments */
        .translated-view .control-btn {
            display: none !important;
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .hero.compact .hero-content {
                grid-template-columns: 70px 1fr;
                gap: 0.75rem;
            }
            
            .movie-poster.compact {
                width: 70px;
                height: 105px;
                font-size: 1.2rem;
            }
            
            .movie-info h1 {
                font-size: 1.1rem;
            }
            
            .translation-controls {
                position: relative;
                top: auto;
                right: auto;
                margin: 1rem 0;
                justify-content: center;
            }
            
            .hero-actions {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</body>
</html>
