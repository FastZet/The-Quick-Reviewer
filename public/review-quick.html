<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quick Reviewer - Quick View</title>
    <link rel="stylesheet" href="/css/review-v2.css">
    {{FAVICON_LINKS}}
</head>
<body>
    <!-- Navigation Header -->
    <nav class="nav-header">
        <div class="container">
            <div class="nav-content">
                <div class="nav-logo">⚡ The Quick Reviewer</div>
                <div class="nav-controls">
                    <a href="{{TOGGLE_URL}}" class="control-btn">📋 Full Review</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="container">
            <div class="hero-content">
                <div class="movie-poster">{{POSTER_CONTENT}}</div>
                <div class="movie-info">
                    {{HERO_CONTENT}}
                </div>
            </div>
        </div>
    </header>

    <!-- Review Content Section -->
    <section class="review-section">
        <div class="container">
            <div class="review-grid">
                <main class="review-main-content">
                    <div class="review-card">
                        <h3>
                            <span class="icon">📖</span>
                            Plot Summary
                        </h3>
                        <p class="review-text">{{PLOT_SUMMARY}}</p>
                    </div>
                    <div class="review-card">
                        <h3>
                            <span class="icon">🏆</span>
                            Overall Verdict
                        </h3>
                        <p class="review-text">{{OVERALL_VERDICT}}</p>
                    </div>
                </main>
                <aside class="sidebar">
                    {{SIDEBAR_CONTENT}}
                </aside>
            </div>
            <p class="timestamp">Review generated on: <span id="utc-timestamp" data-ts="{{TIMESTAMP}}">...</span></p>
        </div>
    </section>

    <!-- Floating Background Elements -->
    <div class="floating-elements">
        <div class="floating-dot"></div>
        <div class="floating-dot"></div>
        <div class="floating-dot"></div>
    </div>

    <script>
        (function() {
            const tsEl = document.getElementById('utc-timestamp');
            if (tsEl && tsEl.dataset.ts) {
                tsEl.textContent = new Date(parseInt(tsEl.dataset.ts, 10)).toLocaleString();
            }
        })();
    </script>
</body>
</html>
